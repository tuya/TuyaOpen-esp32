dependencies:
  # esp_wifi_remote / esp_hosted are only needed when the host MCU has no
  # built-in Wi-Fi/BT and must talk to a co-processor (e.g. ESP32-P4 + C6).
  # Pulling them in on chips with native Wi-Fi (S3, C3, ...) causes link
  # conflicts with libnet80211 (multiple definition of wifi_deinit etc.).
  espressif/esp_wifi_remote:
    version: "0.14.*"
    rules:
      - if: "target == esp32p4"
  espressif/esp_hosted:
    version: "1.4.*"
    rules:
      - if: "target == esp32p4"
  waveshare/esp_lcd_sh8601: "1.0.2"
  espressif/esp-sr: ^2.0.0
  espressif/esp_codec_dev: "~1.3.2"
  espressif/esp_io_expander_tca9554: "==2.0.0"
  espressif/esp_lcd_panel_io_additions: "^1.0.1"
  espressif/esp_lcd_touch_ft5x06: ~1.0.7
